<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="dragmp_nav_screen.css">
</head>
<body>
  <main id="screen">
    <section id="idleScreen" class="screen-page idle-page active">
      <div id="idleLogo" class="idle-logo">DRAGMP</div>
    </section>
    <section id="runScreen" class="screen-page">
      <div class="readout">
        <span class="label">RT</span>
        <span id="rt" class="value">--</span>
      </div>
      <div class="divider"></div>
      <div class="readout">
        <span class="label">ET</span>
        <span id="et" class="value">--</span>
      </div>
    </section>
    <section id="finishScreen" class="screen-page">
      <div class="readout">
        <span class="label">1/4 TIME</span>
        <span id="quarterTime" class="value">--</span>
      </div>
      <div class="divider"></div>
      <div class="readout">
        <span class="label">1/4 MPH</span>
        <span id="quarterMph" class="value">--</span>
      </div>
    </section>
    <aside id="winIndicator" class="win-indicator" aria-hidden="true">
      <div class="win-group">
        <span></span>
        <span></span>
      </div>
      <div class="win-group">
        <span></span>
        <span></span>
      </div>
    </aside>
  </main>
  <script src="dragmp_nav_screen.js"></script>
</body>
</html>
